<!doctype html>

<body class="portfolio-body">
  <nav class="navbar navbar-expand-lg site-nav sticky-top">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Govardhan Reddy Narala</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link active" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="experience.html">Experience</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

      </div>
    </div>
  </nav>

  <header class="container py-5">
    <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3">

        <div class="section-kicker">Project library</div>
        <h1 class="page-title mb-1">Projects</h1>
        <div class="page-copy" id="projectSummary">Each project is written as a case study with architecture context, measurable outcomes, and project-specific AI summaries on the detail page.</div>

      <div class="d-flex flex-column flex-md-row gap-2 w-100 w-md-auto project-controls">
        <input id="searchInput" class="form-control" placeholder="Search by title, tag, stack, or highlight" />
        <select id="sortSelect" class="form-select">
          <option value="featured">Featured first</option>
          <option value="updated">Recently updated</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </div>
    </div>

    <div class="mt-4 d-flex flex-wrap gap-2" id="tagBar"></div>
  </header>

  <main class="container pb-5">
    <div class="row g-4" id="projectGrid"></div>
  </main>

  <div id="chatbotRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
