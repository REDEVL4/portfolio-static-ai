<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Commerce Platform</title>
  <desc id="desc">Stylized architecture card for a realtime commerce platform with storefront, gateway, services, and infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1630"/>
      <stop offset="50%" stop-color="#12284a"/>
      <stop offset="100%" stop-color="#0d1d36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ef0c8"/>
      <stop offset="100%" stop-color="#79b6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#06101f" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="220" fill="#79b6ff" opacity="0.10"/>
  <circle cx="1420" cy="760" r="240" fill="#8ef0c8" opacity="0.08"/>

  <text x="90" y="120" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="26" letter-spacing="5">FULL STACK SYSTEM</text>
  <text x="90" y="190" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700">Realtime Commerce Platform</text>
  <text x="90" y="245" fill="#a5b9d6" font-family="Segoe UI, Arial, sans-serif" font-size="28">Marketplace architecture with gateway, GraphQL, recommendations, fulfillment, and event-driven workflows.</text>

  <g filter="url(#shadow)">
    <rect x="110" y="340" rx="28" ry="28" width="300" height="160" fill="#152947" stroke="#2a486c"/>
    <text x="150" y="395" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="2">FRONTEND</text>
    <text x="150" y="445" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Next.js Apps</text>
    <text x="150" y="485" fill="#a5b9d6" font-family="Segoe UI, Arial, sans-serif" font-size="24">Customer Web + Admin Web</text>

    <rect x="470" y="305" rx="32" ry="32" width="320" height="220" fill="#10233f" stroke="#3b5f8b"/>
    <text x="515" y="365" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="2">ORCHESTRATION</text>
    <text x="515" y="420" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Gateway + BFF</text>
    <text x="515" y="462" fill="#a5b9d6" font-family="Segoe UI, Arial, sans-serif" font-size="24">Express Gateway</text>
    <text x="515" y="497" fill="#a5b9d6" font-family="Segoe UI, Arial, sans-serif" font-size="24">GraphQL Aggregation Layer</text>

    <rect x="860" y="250" rx="28" ry="28" width="260" height="120" fill="#142949" stroke="#2f547d"/>
    <text x="900" y="300" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="2">NODE SERVICES</text>
    <text x="900" y="340" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Catalog • Cart • Orders</text>

    <rect x="1160" y="250" rx="28" ry="28" width="260" height="120" fill="#142949" stroke="#2f547d"/>
    <text x="1205" y="300" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="2">SEARCH</text>
    <text x="1205" y="340" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Meilisearch Service</text>

    <rect x="860" y="415" rx="28" ry="28" width="260" height="120" fill="#142949" stroke="#2f547d"/>
    <text x="900" y="465" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="2">ML</text>
    <text x="900" y="505" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">FastAPI Recommendations</text>

    <rect x="1160" y="415" rx="28" ry="28" width="260" height="120" fill="#142949" stroke="#2f547d"/>
    <text x="1205" y="465" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="2">FULFILLMENT</text>
    <text x="1205" y="505" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">.NET Service + Worker</text>

    <rect x="860" y="605" rx="28" ry="28" width="560" height="150" fill="#0f2039" stroke="#41678f"/>
    <text x="900" y="655" fill="#8ef0c8" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="2">INFRASTRUCTURE</text>
    <text x="900" y="700" fill="#f1f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">MySQL • Redis • RabbitMQ • Redpanda • Docker Compose</text>
    <text x="900" y="738" fill="#a5b9d6" font-family="Segoe UI, Arial, sans-serif" font-size="24">Caching, events, messaging, persistence, and local platform orchestration</text>
  </g>

  <g stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.75">
    <path d="M410 420 L470 420"/>
    <path d="M790 420 L860 310"/>
    <path d="M790 420 L860 475"/>
    <path d="M790 420 L1160 310"/>
    <path d="M790 420 L1160 475"/>
    <path d="M990 535 L990 605"/>
    <path d="M1290 535 L1290 605"/>
  </g>
</svg>
